<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Carousel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #242424;
    }

    .container {
      width: 312px;
      height: 312px;
      background-color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .viewport {
      width: 312px;
      height: 44px;
      background-color: transparent;
      overflow: hidden;
      position: relative;
    }

    .track {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      animation: scroll-up 1.83s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite paused;
      will-change: transform;
    }

    @keyframes scroll-up {
      /* Cycle from bottom to top: Row 3 → Row 2 → Row 1 (within 44px viewport) */
      /* Row 3 to Row 2: 0% - 0.55% (10ms pause), 0.55% - 33.33% (600ms transition) */
      0%, 0.55% {
        transform: translateY(0); /* Row 3 visible (starts at 136px, shifted to viewport) */
      }
      33.33% {
        transform: translateY(-68px); /* Move up 24px + 44px to show Row 2 */
      }
      /* Row 2 to Row 1: 33.33% - 33.88% (10ms pause), 33.88% - 66.67% (600ms transition) */
      33.88% {
        transform: translateY(-68px);
      }
      66.67% {
        transform: translateY(-136px); /* Move up another 24px + 44px to show Row 1 */
      }
      /* Row 1 to Row 3: 66.67% - 67.21% (10ms pause), 67.21% - 100% (600ms transition) */
      67.21% {
        transform: translateY(-136px);
      }
      100% {
        transform: translateY(0); /* Reset to Row 3 for seamless loop */
      }
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 44px;
      flex-shrink: 0;
      padding: 0 24px;
    }

    /* Row 1: Centered in viewport (visible) */
    .row:nth-child(1) {
      margin-top: 0;
    }

    /* Row 2: 24px below Row 1 (hidden) */
    .row:nth-child(2) {
      margin-top: 24px; /* 44px + 24px = 68px from top */
    }

    /* Row 3: 24px below Row 2 (hidden) */
    .row:nth-child(3) {
      margin-top: 24px; /* 68px + 44px + 24px = 136px from top */
    }

    /* Duplicate Row 1: Below Row 3 (hidden) */
    .row:nth-child(4) {
      margin-top: 24px;
    }

    /* Row-specific fade animations - cycle from bottom to top */
    .row:nth-child(1) {
      animation: row1-fade 1.83s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite paused;
      opacity: 0;
    }
    
    .row:nth-child(2) {
      animation: row2-fade 1.83s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite paused;
      opacity: 0;
    }
    
    .row:nth-child(3) {
      animation: row3-fade 1.83s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite paused;
      opacity: 0.25; /* Start at 25% for bottom-to-top cycle */
    }
    
    @keyframes row1-fade {
      /* Row 1 (1a, 2a, 3a, 4a): fades in from Row 2, then fades out to Row 3 */
      0%, 0.55% {
        opacity: 0;
      }
      33.33% {
        opacity: 0;
      }
      40% {
        opacity: 0.25; /* Start fade at 25% */
      }
      50% {
        opacity: 1; /* Full opacity */
      }
      66.67% {
        opacity: 1;
      }
      73% {
        opacity: 0.25; /* Fade out to 25% */
      }
      100% {
        opacity: 0;
      }
    }
    
    @keyframes row2-fade {
      /* Row 2 (2a, 2b, 2c, 2d): fades in from Row 3, then fades out to Row 1 */
      0%, 0.55% {
        opacity: 0;
      }
      8% {
        opacity: 0.25; /* Start fade at 25% */
      }
      15% {
        opacity: 1; /* Full opacity */
      }
      33.33% {
        opacity: 1;
      }
      40% {
        opacity: 0.25; /* Fade out to 25% */
      }
      66.67% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }
    
    @keyframes row3-fade {
      /* Row 3: fades in at start, then fades out to Row 2 */
      0%, 0.55% {
        opacity: 0.25; /* Start at 25% */
      }
      8% {
        opacity: 1; /* Full opacity */
      }
      15% {
        opacity: 1;
      }
      33.33% {
        opacity: 0.25; /* Fade out to 25% */
      }
      40% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .logo {
      height: 10px;
      width: auto;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(69%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(1.1) contrast(1);
      will-change: opacity, transform, filter;
      backface-visibility: hidden;
    }

    /* All logos animate from bottom with blur to clear - staggered left to right */
    .logo {
      animation: logo-blur-animate 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite paused;
    }

    @keyframes logo-blur-animate {
      0% {
        opacity: 0;
        transform: translateY(20px) translateZ(0);
        filter: brightness(0) saturate(100%) invert(69%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(1.1) contrast(1) blur(8px);
      }
      50% {
        opacity: 1;
        transform: translateY(0) translateZ(0);
        filter: brightness(0) saturate(100%) invert(69%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(1.1) contrast(1) blur(0px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) translateZ(0);
        filter: brightness(0) saturate(100%) invert(69%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(1.1) contrast(1) blur(0px);
      }
    }

    /* Staggered animation delays from left to right */
    .logo:nth-child(1) {
      animation-delay: 0ms;
    }

    .logo:nth-child(2) {
      animation-delay: 100ms;
    }

    .logo:nth-child(3) {
      animation-delay: 200ms;
    }

    .logo:nth-child(4) {
      animation-delay: 300ms;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="viewport">
      <div class="track">
      <!-- Row 1: Perplexity, Anthropic, Grok, OpenAI -->
      <div class="row">
        <img src="public/assets/Perplexity.svg" alt="Perplexity" class="logo" style="--logo-index: 0;">
        <img src="public/assets/Anthropic.svg" alt="Anthropic" class="logo" style="--logo-index: 1;">
        <img src="public/assets/Grok.svg" alt="Grok" class="logo" style="--logo-index: 2;">
        <img src="public/assets/OpenAI.svg" alt="OpenAI" class="logo" style="--logo-index: 3;">
      </div>
      
      <!-- Row 2: Cursor, Figma, Unicorn, Supabase -->
      <div class="row">
        <img src="public/assets/Cursor.svg" alt="Cursor" class="logo" style="--logo-index: 0;">
        <img src="public/assets/Figma.svg" alt="Figma" class="logo" style="--logo-index: 1;">
        <img src="public/assets/Unicorn.svg" alt="Unicorn" class="logo" style="--logo-index: 2;">
        <img src="public/assets/Supabase.svg" alt="Supabase" class="logo" style="--logo-index: 3;">
      </div>
      
      <!-- Row 3: Contra, MagicPath, Supabase, Framer -->
      <div class="row">
        <img src="public/assets/Contra.svg" alt="Contra" class="logo" style="--logo-index: 0;">
        <img src="public/assets/MagicPath.svg" alt="MagicPath" class="logo" style="--logo-index: 1;">
        <img src="public/assets/Paper.svg" alt="Paper" class="logo" style="--logo-index: 2;">
        <img src="public/assets/Framer.svg" alt="Framer" class="logo" style="--logo-index: 3;">
      </div>
      
      <!-- Duplicate Row 1 for seamless loop -->
      <div class="row">
      </div>
      </div>
    </div>
  </div>
</body>
</html>
