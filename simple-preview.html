<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Carousel - Simple Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #242424;
      color: white;
      font-family: system-ui;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }
    h1 { margin-bottom: 40px; }
    .carousel {
      width: 312px;
      height: 44px;
      background: #1a1a1a;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .track {
      display: flex;
      flex-direction: column;
      animation: scroll 1800ms cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes scroll {
      0%, 0.22% { transform: translateY(0); }
      33.33% { transform: translateY(-44px); }
      33.55% { transform: translateY(-44px); }
      66.67% { transform: translateY(-88px); }
      66.89% { transform: translateY(-88px); }
      100% { transform: translateY(-132px); }
    }
    .row {
      display: flex;
      gap: 24px;
      height: 44px;
      align-items: center;
      justify-content: center;
    }
    .logo {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(0.69);
    }
  </style>
</head>
<body>
  <h1>Logo Carousel Preview</h1>
  <div class="carousel">
    <div class="track">
      <div class="row">
        <img src="public/assets/Perplexity.svg" class="logo" alt="Perplexity">
        <img src="public/assets/OpenAI.svg" class="logo" alt="OpenAI">
        <img src="public/assets/Grok.svg" class="logo" alt="Grok">
        <img src="public/assets/Anthropic.svg" class="logo" alt="Anthropic">
      </div>
      <div class="row">
        <img src="public/assets/Cursor.svg" class="logo" alt="Cursor">
        <img src="public/assets/Framer.svg" class="logo" alt="Framer">
        <img src="public/assets/Unicorn.svg" class="logo" alt="Unicorn">
        <img src="public/assets/Supabase.svg" class="logo" alt="Supabase">
      </div>
      <div class="row">
        <img src="public/assets/MagicPath.svg" class="logo" alt="MagicPath">
        <img src="public/assets/Figma.svg" class="logo" alt="Figma">
        <img src="public/assets/Paper.svg" class="logo" alt="Paper">
        <img src="public/assets/Contra.svg" class="logo" alt="Contra">
      </div>
      <div class="row">
        <img src="public/assets/Perplexity.svg" class="logo" alt="Perplexity">
        <img src="public/assets/OpenAI.svg" class="logo" alt="OpenAI">
        <img src="public/assets/Grok.svg" class="logo" alt="Grok">
        <img src="public/assets/Anthropic.svg" class="logo" alt="Anthropic">
      </div>
    </div>
  </div>
  <p style="margin-top: 40px; color: #888;">Container: 312×44px | Background: #1a1a1a</p>
</body>
</html>
